      function showToast(message) {
        toastEl.textContent = message;
        toastEl.classList.add("is-visible");
        if (ui.toastTimer) clearTimeout(ui.toastTimer);
        ui.toastTimer = setTimeout(() => toastEl.classList.remove("is-visible"), 2200);
      }

      function applyPlan() {
        const zone = selectedZone();
        const useSelect = panelEl.querySelector('[data-role="zone-use"]');
        const intensityInput = panelEl.querySelector('[data-role="zone-intensity"]');
        if (!useSelect || !intensityInput) return;
        const newUse = useSelect.value;
        const newIntensity = Number(intensityInput.value);
        const changed = newUse !== zone.use || newIntensity !== zone.intensity;
        if (!changed) {
          showToast("规划方案没有变化");
          return;
        }
        const capitalCost = 2 + Math.abs(newIntensity - zone.intensity) * 0.7 + (newUse !== zone.use ? 1.5 : 0);
        if (state.politicalCapital < capitalCost) {
          showToast("政治资本不足，规划调整未获通过");
          return;
        }
        const oldUse = USES[zone.use].label;
        state.politicalCapital -= capitalCost;
        state.funds -= 0.35 + zone.area * 0.006;
        zone.use = newUse;
        zone.intensity = newIntensity;
        zone.housingCapacity = zone.area * 4200 * zone.intensity * USES[zone.use].housing * Math.max(0.35, zone.development);
        addEvent(`${zone.name}由“${oldUse}”调整为“${USES[newUse].label}”，开发强度设为${newIntensity}级。`);
        renderAll();
        showToast("规划方案已批准，市场将逐步响应");
      }

      function policyChangeCost() {
        let cost = 1.5;
        for (const [key, meta] of Object.entries(POLICY_META)) {
          cost += Math.abs(Number(ui.policyDraft[key]) - Number(state.policyTargets[key])) / Math.max(1, meta.max - meta.min) * 8;
        }
        if (ui.policyDraft.transportMode !== state.policyTargets.transportMode) cost += 1.2;
        return cost;
      }

      function applyPolicy() {
        const transport = panelEl.querySelector('[data-role="transport-mode"]');
        if (transport) ui.policyDraft.transportMode = transport.value;
        const cost = policyChangeCost();
        if (state.politicalCapital < cost) {
          showToast(`需要${cost.toFixed(1)}点政治资本，当前不足`);
          return;
        }
        state.politicalCapital -= cost;
        state.policyTargets = { ...ui.policyDraft };
        addEvent(`市委常委会通过新一期经济与社会政策方案，预计需要数周逐步落实。`);
        renderAll();
        showToast(`政策方案已提交，消耗${cost.toFixed(1)}点政治资本`);
      }

      function buildProject() {
        const zone = selectedZone();
        const projectType = panelEl.querySelector('[data-role="project-type"]')?.value || ui.projectType;
        const mode = panelEl.querySelector('[data-role="project-mode"]')?.value || ui.projectMode;
        const definition = PROJECTS[projectType];
        if (!definition) return;
        const modeConfig = {
          direct: { upfront: 1, duration: 1, quality: 1, longTerm: 0 },
          ppp: { upfront: 0.28, duration: 0.78, quality: 0.9, longTerm: 1.16 },
          outsource: { upfront: 0.12, duration: 0.62, quality: 0.78, longTerm: 1.38 }
        }[mode];
        const upfront = definition.cost * modeConfig.upfront;
        if (state.funds < upfront + 8) {
          showToast(`至少需要保留8亿元周转资金，目前无法支付${upfront.toFixed(1)}亿元首期款`);
          return;
        }
        state.funds -= upfront;
        const department = ["school", "hospital"].includes(projectType) ? "social" : projectType === "sewage" ? "environment" : "housing";
        const project = {
          id: ++state.projectSerial,
          type: projectType,
          label: definition.label,
          mode,
          department,
          status: "building",
          progress: 0,
          duration: Math.round(definition.weeks * modeConfig.duration),
          delay: 0,
          quality: modeConfig.quality,
          service: definition.service,
          capacity: definition.capacity,
          totalCost: definition.cost
        };
        zone.projects.push(project);
        if (mode !== "direct") {
          const obligationTotal = definition.cost * modeConfig.longTerm - upfront;
          const remaining = mode === "ppp" ? 260 : 208;
          state.pppObligations.push({ projectId: project.id, weekly: obligationTotal / remaining, remaining });
          state.hiddenDebt += obligationTotal * (mode === "ppp" ? 0.72 : 0.46);
          state.corruptionRisk = clamp(state.corruptionRisk + (mode === "ppp" ? 0.9 : 1.4), 0, 100);
        }
        addEvent(`${zone.name}${definition.label}获批，采用${mode === "direct" ? "政府直接建设" : mode === "ppp" ? "政企合作" : "私人建设与服务采购"}模式。`);
        ui.projectType = projectType;
        ui.projectMode = mode;
        renderAll();
        showToast("项目已批准并进入建设阶段");
      }

      function searchCandidates(department) {
        if (state.politicalCapital < 2) {
          showToast("政治资本不足，暂时无法启动干部考察");
          return;
        }
        state.politicalCapital -= 2;
        const rng = new RNG(state.rngState);
        const departmentMeta = DEPARTMENTS.find(item => item.id === department);
        state.candidatePools = {};
        state.candidatePools[department] = [0, 1, 2].map(() => createCadre(rng, departmentMeta));
        state.rngState = rng.state;
        renderPanel();
      }

      function appointCandidate(department, index) {
        const candidates = state.candidatePools[department];
        const candidate = candidates?.[index];
        if (!candidate) return;
        if (state.politicalCapital < 7) {
          showToast("完成任命需要7点政治资本");
          return;
        }
        state.politicalCapital -= 7;
        const position = state.cadres.findIndex(cadre => cadre.department === department);
        const former = state.cadres[position];
        state.cadres[position] = candidate;
        state.candidatePools = {};
        addEvent(`${candidate.name}接任${candidate.departmentLabel}负责人，${former.name}调整岗位。`);
        updateEvaluation(state);
        renderAll();
        showToast("干部任命已经完成");
      }

      function continueTerm() {
        state.term += 1;
        state.termEnded = false;
        state.baselineGDP = state.annualGDP;
        state.previousAnnualGDP = state.annualGDP;
        state.politicalCapital = clamp(state.politicalCapital + 18, 0, 100);
        state.activeTask = state.term % 3 === 0
          ? { label: "控制地方债务与金融风险", metric: "risk", target: 70, progress: state.evaluationParts.risk }
          : state.term % 2 === 0
            ? { label: "提升公共服务均等化水平", metric: "livelihood", target: 72, progress: state.evaluationParts.livelihood }
            : { label: "推进传统制造业技术改造", metric: "technology", target: 18, progress: 6 };
        addEvent(`第${state.term}届任期开始，上级考核重点调整为“${state.activeTask.label}”。`);
        renderAll();
      }

      function openDatabase() {
        return new Promise((resolve, reject) => {
          if (!window.indexedDB) {
            reject(new Error("IndexedDB unavailable"));
            return;
          }
          const request = indexedDB.open("city-governance-sim", 1);
          request.onupgradeneeded = () => {
            if (!request.result.objectStoreNames.contains("saves")) request.result.createObjectStore("saves");
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function saveGame() {
        try {
          const db = await openDatabase();
          await new Promise((resolve, reject) => {
            const transaction = db.transaction("saves", "readwrite");
            transaction.objectStore("saves").put(state, "slot-1");
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
          });
          db.close();
          showToast("当前任期已保存");
        } catch (error) {
          showToast("保存失败，浏览器可能限制了本地存储");
        }
      }

      async function loadGame() {
        try {
          const db = await openDatabase();
          const loaded = await new Promise((resolve, reject) => {
            const transaction = db.transaction("saves", "readonly");
            const request = transaction.objectStore("saves").get("slot-1");
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
          });
          db.close();
          if (!loaded || loaded.version !== 1) {
            showToast("没有找到可读取的第一版存档");
            return;
          }
          state = loaded;
          state.running = false;
          ui.selectedZoneId = state.map.centerZoneId;
          ui.policyDraft = { ...state.policyTargets };
          ui.view.initialized = false;
          resetView();
          renderAll();
          showToast("存档已读取");
        } catch (error) {
          showToast("读取失败，存档可能不可用");
        }
      }

      function createNewCity() {
        if (!window.confirm("生成新城市将替换当前未保存的进度，是否继续？")) return;
        state = createState((Date.now() ^ Math.floor(Math.random() * 0xffffffff)) >>> 0);
        ui.selectedZoneId = state.map.centerZoneId;
        ui.policyDraft = { ...state.policyTargets };
        ui.activeTab = "planning";
        ui.view.initialized = false;
        resetView();
        renderAll();
        showToast("新的内陆制造业城市已经生成");
      }

      function selectMapPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const worldX = (clientX - rect.left - ui.view.x) / ui.view.scale;
        const worldY = (clientY - rect.top - ui.view.y) / ui.view.scale;
        const cell = state.map.cells.find(item => pointInPolygon(worldX, worldY, item.polygon));
        if (!cell || cell.water || cell.zoneId < 0) return;
        ui.selectedZoneId = cell.zoneId;
        ui.activeTab = "planning";
        ui.dirtyMap = true;
        renderAll();
      }

      root.addEventListener("click", event => {
        const tab = event.target.closest("[data-tab]");
        if (tab) {
          ui.activeTab = tab.dataset.tab;
          if (ui.activeTab === "policy") ui.policyDraft = { ...state.policyTargets };
          renderPanel();
          return;
        }
        const button = event.target.closest("[data-action]");
        if (!button) return;
        const action = button.dataset.action;
        if (action === "toggle-run") {
          if (state.termEnded) continueTerm();
          else state.running = !state.running;
          renderHeader();
        } else if (action === "speed") {
          state.speed = Number(button.dataset.speed);
          renderHeader();
        } else if (action === "reset-view") resetView();
        else if (action === "new-city") createNewCity();
        else if (action === "save") saveGame();
        else if (action === "load") loadGame();
        else if (action === "apply-plan") applyPlan();
        else if (action === "apply-policy") applyPolicy();
        else if (action === "build-project") buildProject();
        else if (action === "search-candidates") searchCandidates(button.dataset.department);
        else if (action === "appoint-candidate") appointCandidate(button.dataset.department, Number(button.dataset.candidate));
      });

      root.addEventListener("input", event => {
        const policy = event.target.dataset.policy;
        if (policy) {
          ui.policyDraft[policy] = Number(event.target.value);
          const meta = POLICY_META[policy];
          const label = panelEl.querySelector(`[data-policy-value="${policy}"]`);
          if (label) label.textContent = `${Number(event.target.value).toFixed(meta.step < 1 ? 1 : 0)}${meta.unit}`;
        }
        if (event.target.matches('[data-role="zone-intensity"]')) {
          const label = panelEl.querySelector('[data-bind="zone-intensity-value"]');
          if (label) label.textContent = `${event.target.value}级`;
        }
      });

      root.addEventListener("change", event => {
        if (event.target.matches('[data-action="overlay"]')) {
          ui.overlay = event.target.value;
          ui.dirtyMap = true;
          renderMapStatus();
        } else if (event.target.matches('[data-role="project-type"]')) {
          ui.projectType = event.target.value;
          renderProjectsPanel();
        } else if (event.target.matches('[data-role="project-mode"]')) {
          ui.projectMode = event.target.value;
        } else if (event.target.matches('[data-role="transport-mode"]')) {
          ui.policyDraft.transportMode = event.target.value;
        }
      });

      function pointerPair() {
        return [...ui.pointers.values()].slice(0, 2);
      }

      function pointerMidpoint(points) {
        return { x: (points[0].x + points[1].x) / 2, y: (points[0].y + points[1].y) / 2 };
      }

      function pointerDistance(points) {
        return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
      }

      canvas.addEventListener("pointerdown", event => {
        canvas.setPointerCapture(event.pointerId);
        ui.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        if (ui.pointers.size === 1) {
          ui.dragging = true;
          ui.pointerStart = { x: event.clientX, y: event.clientY };
          ui.lastPointer = { x: event.clientX, y: event.clientY };
          ui.pinch = null;
        } else if (ui.pointers.size === 2) {
          const points = pointerPair();
          const midpoint = pointerMidpoint(points);
          const rect = canvas.getBoundingClientRect();
          ui.dragging = false;
          ui.pinch = {
            distance: Math.max(1, pointerDistance(points)),
            scale: ui.view.scale,
            worldX: (midpoint.x - rect.left - ui.view.x) / ui.view.scale,
            worldY: (midpoint.y - rect.top - ui.view.y) / ui.view.scale
          };
        }
      });

      canvas.addEventListener("pointermove", event => {
        if (!ui.pointers.has(event.pointerId)) return;
        ui.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        if (ui.pointers.size >= 2 && ui.pinch) {
          const points = pointerPair();
          const midpoint = pointerMidpoint(points);
          const rect = canvas.getBoundingClientRect();
          const nextScale = clamp(ui.pinch.scale * pointerDistance(points) / ui.pinch.distance, 0.32, 3.4);
          ui.view.x = midpoint.x - rect.left - ui.pinch.worldX * nextScale;
          ui.view.y = midpoint.y - rect.top - ui.pinch.worldY * nextScale;
          ui.view.scale = nextScale;
          ui.dirtyMap = true;
          return;
        }
        if (!ui.dragging || !ui.lastPointer) return;
        const dx = event.clientX - ui.lastPointer.x;
        const dy = event.clientY - ui.lastPointer.y;
        ui.view.x += dx;
        ui.view.y += dy;
        ui.lastPointer = { x: event.clientX, y: event.clientY };
        ui.dirtyMap = true;
      });

      function releasePointer(event, allowSelection) {
        const wasSingle = ui.pointers.size === 1;
        const moved = ui.pointerStart ? Math.hypot(event.clientX - ui.pointerStart.x, event.clientY - ui.pointerStart.y) : Infinity;
        ui.pointers.delete(event.pointerId);
        if (allowSelection && wasSingle && moved < 8) selectMapPoint(event.clientX, event.clientY);
        if (ui.pointers.size === 1) {
          const remaining = [...ui.pointers.values()][0];
          ui.dragging = true;
          ui.pointerStart = { ...remaining };
          ui.lastPointer = { ...remaining };
        } else {
          ui.dragging = false;
          ui.pointerStart = null;
          ui.lastPointer = null;
        }
        ui.pinch = null;
      }

      canvas.addEventListener("pointerup", event => releasePointer(event, true));
      canvas.addEventListener("pointercancel", event => releasePointer(event, false));

      canvas.addEventListener("wheel", event => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;
        const worldX = (mouseX - ui.view.x) / ui.view.scale;
        const worldY = (mouseY - ui.view.y) / ui.view.scale;
        const nextScale = clamp(ui.view.scale * Math.exp(-event.deltaY * 0.0011), 0.32, 3.4);
        ui.view.x = mouseX - worldX * nextScale;
        ui.view.y = mouseY - worldY * nextScale;
        ui.view.scale = nextScale;
        ui.dirtyMap = true;
      }, { passive: false });

      const resizeObserver = new ResizeObserver(() => {
        resizeCanvas();
        ui.dirtyMap = true;
      });
      resizeObserver.observe(canvas.parentElement);

      function animationFrame(now) {
        const elapsed = Math.min(250, now - ui.lastTime);
        ui.lastTime = now;
        let advanced = false;
        if (state.running && !state.termEnded) {
          ui.accumulator += elapsed / 1000 * state.speed;
          let safety = 0;
          while (ui.accumulator >= 1 && safety < 8) {
            tickWeek();
            ui.accumulator -= 1;
            safety += 1;
            advanced = true;
          }
        }
        if (advanced) renderAll();
        drawMap();
        requestAnimationFrame(animationFrame);
      }

      resetView();
      renderAll();
      requestAnimationFrame(animationFrame);

    })();
  </script>
</div>

<script id="codex-visualization-floating-ui-core" src="https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js"></script>
<script id="codex-visualization-floating-ui-dom" src="https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js"></script>

<script id="codex-visualization-tooltip">/* oxlint-disable typescript/no-unsafe-argument, typescript/no-unsafe-call, typescript/no-unsafe-return */
// Runs inside the visualization sandbox, not the host webview.
(() => {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set(["top", "right", "bottom", "left"]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =>
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest("[data-tooltip]")
      : null;
  const containsTarget = (trigger, target) =>
    target?.nodeType != null && trigger.contains(target);
  const getContent = (trigger) =>
    trigger.getAttribute("data-tooltip")?.trim() ?? "";
  const getPlacement = (trigger) => {
    const placement = trigger.getAttribute("data-tooltip-placement");
    return tooltipPlacements.has(placement) ? placement : "top";
  };
  const getTooltip = () => {
    if (tooltip == null) {
      tooltip = document.createElement("div");
      tooltip.id = tooltipId;
      tooltip.className = "tooltip";
      tooltip.setAttribute("role", "tooltip");
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) => {
    const ids = new Set(
      (trigger.getAttribute("aria-describedby") ?? "")
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute("aria-describedby");
    } else {
      trigger.setAttribute("aria-describedby", [...ids].join(" "));
    }
  };
  const clearOpenTimeout = () => {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) => {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) => {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              "--tooltip-available-width",
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              "--tooltip-available-height",
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: "fixed",
    })
      .then(({ x, y }) => {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = "visible";
      })
      .catch(() => {
        if (activeTrigger === trigger && request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) => {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = "hidden";
    floating.style.transform = "translate(0, 0)";
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () => {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) => {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() < skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() => {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) => {
    if (event.pointerType === "touch") {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(":focus-visible")) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) => {
    if (event.key === "Escape") {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) => {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () => {
    closeTooltip(false);
    document.removeEventListener("pointerover", handlePointerOpen);
    document.removeEventListener("pointerout", handleLeave);
    document.removeEventListener("focusin", handleFocusIn);
    document.removeEventListener("focusout", handleLeave);
    document.removeEventListener("keydown", handleKeyDown);
    document.removeEventListener("contextmenu", handleContextMenu);
    tooltip = null;
  };

  document.addEventListener("pointerover", handlePointerOpen);
  document.addEventListener("pointerout", handleLeave);
  document.addEventListener("focusin", handleFocusIn);
  document.addEventListener("focusout", handleLeave);
  document.addEventListener("keydown", handleKeyDown);
  document.addEventListener("contextmenu", handleContextMenu);
  window.addEventListener("pagehide", destroy, { once: true });
})();
</script>
<script id="codex-visualization-lucide-initialization">(() => {
  const initialize = () => {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById("codex-visualization-lucide")
    ?.addEventListener("load", initialize, { once: true });
})();
</script>
